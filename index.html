<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team 8725 培訓室工具與材料管理系統</title>
  <link rel="icon" href="images/icon.ico">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar navigation -->
    <nav class="side-nav" aria-label="主導覽">
      <div class="brand">
        <img class="brand-logo" src="images/icon.ico" alt="Team 8725 Misty Panther Logo">
        <div>
          <div class="brand-name">Team 8725</div>
          <div class="brand-sub">Misty Panther · Workshop</div>
        </div>
      </div>
      <a class="nav-link" href="index.html" data-page="index.html"><span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 3 3 5v16l6-2 6 2 6-2V3l-6 2-6-2Z"/><path d="M9 3v16"/><path d="M15 5v16"/></svg></span> 平面圖總覽</a>
      <a class="nav-link" href="#" data-action="reset-demo"><span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg></span> 重設示範資料</a>
      <div class="nav-spacer"></div>
      <a class="nav-link" href="README.md"><span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 5a2 2 0 0 1 2-2h12v18H6a2 2 0 0 1-2-2Z"/><path d="M4 15h14"/></svg></span> 使用說明</a>
    </nav>

    <!-- Main content -->
    <main class="main">
      <div class="page-head">
        <div>
          <h1 class="page-title">培訓室總覽</h1>
          <p class="page-sub">點擊平面圖上的區域查看內容，或使用搜尋快速定位工具與材料。</p>
        </div>
        <button class="btn btn-primary" id="add-item-btn">＋ 新增物品</button>
      </div>

      <div id="mode-banner"></div>

      <div class="home-layout">
        <!-- Left: search & filter -->
        <aside class="sidebar">
          <div class="card">
            <h3 class="card-title">搜尋</h3>
            <div class="search-box">
              <span class="ico" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>
              <input id="global-search" type="search" placeholder="名稱、標籤、說明、位置…"
                     aria-label="全域搜尋" autocomplete="off">
            </div>
            <div class="filter-row" style="margin-top:12px" role="group" aria-label="類型篩選">
              <button class="filter-btn active" data-filter="all">全部</button>
              <button class="filter-btn" data-filter="tool">工具</button>
              <button class="filter-btn" data-filter="material">材料</button>
              <button class="filter-btn" data-filter="low">低存量</button>
            </div>
          </div>

          <div class="card results-card">
            <div class="results-header">
              <h3 class="card-title">搜尋結果 <span class="result-count" id="result-count">0</span></h3>
              <div id="search-view-switcher"></div>
            </div>
            <div class="result-list" id="result-list">
              <div class="state-block"><div class="spinner"></div>載入中…</div>
            </div>
          </div>
        </aside>

        <!-- Center: floor plan -->
        <section class="card map-panel" aria-label="培訓室平面圖">
          <h3 class="card-title">培訓室平面圖</h3>
          <div id="map-status"></div>
          <div class="workshop-map-wrapper">
            <div class="workshop-map">
              <img src="images/workshop-floor-plan.png" alt="培訓室平面圖" id="workshop-map-image">
              <div id="map-hotspots"></div>
            </div>
          </div>
          <div class="map-legend">
            <span class="legend-item"><span class="legend-dot" style="background:var(--cffy-theme-primary-a20)"></span> 可點擊區域（滑鼠移入查看摘要）</span>
          </div>
        </section>

        <!-- Right: summary -->
        <aside class="summary-panel">
          <div class="card">
            <h3 class="card-title">狀態摘要</h3>
            <div id="summary-stats"><div class="spinner"></div></div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script type="module" src="js/home.js"></script>
</body>
</html>
