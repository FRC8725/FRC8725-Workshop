<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1417 2000" width="1417" height="2000" role="img" aria-label="培訓室平面圖">
  <defs>
    <style>
      .box { fill:#9e9e9e; stroke:#6d6d6d; stroke-width:3; }
      .lbl { fill:#ffffff; font-family:'Segoe UI','Microsoft JhengHei',sans-serif; font-weight:700; text-anchor:middle; dominant-baseline:middle; }
      .big { font-size:52px; }
      .mid { font-size:40px; }
      .sml { font-size:30px; }
      .num { font-size:64px; }
      .numS { font-size:44px; }
    </style>
  </defs>
  <rect x="0" y="0" width="1417" height="2000" fill="#f4f4f4"/>

  <!-- 零件快取盒 (top) -->
  <rect class="box" x="160" y="50" width="315" height="165"/>
  <text class="lbl mid" x="317" y="132">零件快取盒</text>

  <!-- 11 12 13 14 -->
  <rect class="box" x="160" y="215" width="155" height="115"/>
  <text class="lbl num" x="237" y="274">11</text>
  <rect class="box" x="315" y="215" width="155" height="115"/>
  <text class="lbl num" x="392" y="274">12</text>
  <rect class="box" x="470" y="215" width="155" height="115"/>
  <text class="lbl num" x="547" y="274">13</text>
  <rect class="box" x="625" y="215" width="85" height="115"/>
  <text class="lbl numS" x="667" y="274">14</text>

  <!-- 防潮箱 A / B / C -->
  <rect class="box" x="160" y="535" width="115" height="165"/>
  <text class="lbl sml" x="217" y="617">防潮箱 A</text>
  <rect class="box" x="160" y="700" width="115" height="140"/>
  <text class="lbl sml" x="217" y="770">防潮箱 B</text>
  <rect class="box" x="160" y="865" width="85" height="115"/>
  <text class="lbl mid" x="202" y="922">C</text>

  <!-- 材料櫃 1 / 2 -->
  <rect class="box" x="425" y="470" width="215" height="415"/>
  <rect class="box" x="425" y="975" width="215" height="415"/>

  <!-- CNC -->
  <rect class="box" x="160" y="1040" width="185" height="350"/>
  <text class="lbl big" x="252" y="1215">CNC</text>

  <!-- 15 - 21 -->
  <rect class="box" x="760" y="480" width="120" height="167"/>
  <text class="lbl num" x="820" y="563">15</text>
  <rect class="box" x="760" y="647" width="120" height="167"/>
  <text class="lbl num" x="820" y="730">16</text>
  <rect class="box" x="760" y="814" width="120" height="167"/>
  <text class="lbl num" x="820" y="897">17</text>
  <rect class="box" x="760" y="981" width="120" height="167"/>
  <text class="lbl num" x="820" y="1064">18</text>
  <rect class="box" x="760" y="1148" width="120" height="167"/>
  <text class="lbl num" x="820" y="1231">19</text>
  <rect class="box" x="760" y="1315" width="120" height="167"/>
  <text class="lbl num" x="820" y="1398">20</text>
  <rect class="box" x="760" y="1482" width="120" height="167"/>
  <text class="lbl num" x="820" y="1565">21</text>

  <!-- 洞洞板 -->
  <rect class="box" x="880" y="480" width="280" height="820"/>
  <text class="lbl big" x="1020" y="890">洞洞板</text>

  <!-- 24 23 22 -->
  <rect class="box" x="160" y="1520" width="150" height="130"/>
  <text class="lbl num" x="235" y="1585">24</text>
  <rect class="box" x="310" y="1520" width="150" height="130"/>
  <text class="lbl num" x="385" y="1585">23</text>
  <rect class="box" x="460" y="1520" width="160" height="130"/>
  <text class="lbl num" x="540" y="1585">22</text>

  <!-- 零件快取盒 (bottom) -->
  <rect class="box" x="310" y="1650" width="310" height="160"/>
  <text class="lbl mid" x="465" y="1730">零件快取盒</text>
</svg>
